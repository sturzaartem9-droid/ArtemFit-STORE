<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArtemBrat STORE</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
}

header{
    background:black;
    color:white;
    text-align:center;
    padding:40px;
}

header h1{
    font-size:50px;
}

header p{
    margin-top:10px;
    color:#cccccc;
}

.container{
    max-width:1200px;
    margin:auto;
    padding:40px 20px;
    text-align:center;
}

.btn{
    display:inline-block;
    margin-top:20px;
    background:#007bff;
    color:white;
    padding:12px 25px;
    border-radius:10px;
    text-decoration:none;
    font-size:18px;
}

.btn:hover{
    background:#0056b3;
}

.products{
    display:flex;
    justify-content:center;
    gap:30px;
    flex-wrap:wrap;
    margin-top:40px;
}

.product{
    background:white;
    width:300px;
    border-radius:15px;
    padding:20px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.product img{
    width:100%;
    border-radius:10px;
}

.product h3{
    margin-top:15px;
}

.price{
    color:green;
    font-size:24px;
    font-weight:bold;
    margin-top:10px;
}

.buy-btn{
    display:inline-block;
    margin-top:15px;
    background:black;
    color:white;
    padding:10px 20px;
    text-decoration:none;
    border-radius:8px;
}
</style>

</head>
<body>

<header>
    <h1>ArtemFit STORE</h1>
    <p>Ready Clothing Sets For Boys & Girls</p>
</header>

<div class="container">

    <h2>Welcome!</h2>
    <p>Find stylish clothing sets at affordable prices.</p>

    <a href="https://www.vinted.be/" class="btn">Contact</a>

    <div class="products">

        <div class="product">
            <img src="https://i.pinimg.com/736x/4b/3f/4c/4b3f4c77358ca49d683adb91f7604c37.jpg">
            <h3>Nike Summer Set</h3>
            <p>T-shirt + Shorts</p>
            <p class="price">€25</p>
            <a href="https://www.vinted.be/" class="buy-btn">Buy Now</a>
        </div>

        <div class="product">
            <img src="https://i.pinimg.com/1200x/31/9b/00/319b0097947d9c4acfbffb90b24efc8c.jpg">
            <h3>Adidas Sport Set</h3>
            <p>Hoodie + Joggers</p>
            <p class="price">€35</p>
            <a href="https://www.vinted.be/" class="buy-btn">Buy Now</a>
        </div>

        <div class="product">
            <img src="https://i.pinimg.com/1200x/4e/51/76/4e5176ac4f8fa9052fb7ac3f899ccd36.jpg">
            <h3>Under Armour Set</h3>
            <p>Training Outfit</p>
            <p class="price">€30</p>
            <a href="https://www.vinted.be/" class="buy-btn">Buy Now</a>
        </div>

    </div>

</div>

</body>
</html>
